apiVersion: batch/v1
kind: Job
metadata:
  name: qlora-evaluation-job
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: evaluator
          image: your-registry/structured-output-llm:latest
          imagePullPolicy: IfNotPresent
          command: ["/app/docker/entrypoint.sh", "evaluate"]
          args:
            - --model-config
            - /app/configs/model_config.yaml
            - --training-config
            - /app/configs/training_config.yaml
            - --schema-config
            - /app/configs/schema_config.yaml
            - --output-report
            - /mnt/output/evaluation/report.json
          env:
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                secretKeyRef:
                  name: mlflow-config
                  key: tracking_uri
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: data-volume
              mountPath: /mnt/data
            - name: output-volume
              mountPath: /mnt/output
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: llm-data-pvc
        - name: output-volume
          persistentVolumeClaim:
            claimName: llm-output-pvc
