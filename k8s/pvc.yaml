apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llm-dataset-pvc
  labels:
    app.kubernetes.io/name: structured-output-llm
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llm-models-pvc
  labels:
    app.kubernetes.io/name: structured-output-llm
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 200Gi
