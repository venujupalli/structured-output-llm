apiVersion: batch/v1
kind: Job
metadata:
  name: llm-training-job
  labels:
    app.kubernetes.io/name: structured-output-llm
    app.kubernetes.io/component: training
spec:
  backoffLimit: 3
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: structured-output-llm
        app.kubernetes.io/component: training
    spec:
      restartPolicy: Never
      nodeSelector:
        accelerator: nvidia
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: trainer
          image: your-registry/structured-output-llm:latest
          imagePullPolicy: IfNotPresent
          command: ["bash", "-c", "python src/training/train.py"]
          env:
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow:5000"
            - name: MODEL_NAME
              value: "llm-model"
            - name: DATA_PATH
              value: "/data"
            - name: CONFIG_PATH
              value: "/config/training_config.yaml"
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: dataset-volume
              mountPath: /data
            - name: model-artifacts-volume
              mountPath: /models
            - name: config-volume
              mountPath: /config
              readOnly: true
      volumes:
        - name: dataset-volume
          persistentVolumeClaim:
            claimName: llm-dataset-pvc
        - name: model-artifacts-volume
          persistentVolumeClaim:
            claimName: llm-models-pvc
        - name: config-volume
          configMap:
            name: llm-pipeline-config
