apiVersion: batch/v1
kind: Job
metadata:
  name: llm-training-job
  labels:
    app.kubernetes.io/name: structured-output-llm
    app.kubernetes.io/component: training
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: structured-output-llm
        app.kubernetes.io/component: training
    spec:
      restartPolicy: Never
      containers:
        - name: trainer
          image: structured-output-llm:latest
          imagePullPolicy: Never
          command:
            - /app/docker/entrypoint.sh
            - train
            - --model-config
            - /config/model_config.k8s.yaml
            - --training-config
            - /config/training_config.yaml
            - --override-config
            - /config/training_config.k8s.yaml
          env:
            - name: TRANSFORMERS_CACHE
              value: /models/cache
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "3Gi"
          volumeMounts:
            - name: model-artifacts-volume
              mountPath: /models
            - name: config-volume
              mountPath: /config
              readOnly: true
      volumes:
        - name: model-artifacts-volume
          persistentVolumeClaim:
            claimName: llm-models-pvc
        - name: config-volume
          configMap:
            name: llm-pipeline-config
