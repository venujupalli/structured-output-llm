schema:
  type: object
  required:
    - order_id
    - customer_name
    - items
    - total_amount
    - shipping_address
    - order_date
  properties:
    order_id:
      type: string
    customer_name:
      type: string
    items:
      type: array
      items:
        type: object
        required:
          - product_name
          - quantity
          - price
        properties:
          product_name:
            type: string
          quantity:
            type: integer
          price:
            type: number
    total_amount:
      type: number
    shipping_address:
      type: string
    order_date:
      type: string
