model_name: sshleifer/tiny-gpt2
cache_dir: /models/cache
load_in_4bit: false
device_map: cpu
trust_remote_code: false
max_retries: 3
retry_backoff_seconds: 2
lora:
  r: 4
  lora_alpha: 8
  lora_dropout: 0.05
  target_modules:
    - c_attn
quantization:
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: float32
  bnb_4bit_use_double_quant: false
