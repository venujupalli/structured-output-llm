seed: 42
output_dir: /models/latest
max_seq_length: 128
num_train_epochs: 1
per_device_train_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 5e-4
logging_steps: 1
save_steps: 10
save_total_limit: 1
bf16: false
fp16: false
optimizer: adamw_torch
lr_scheduler_type: cosine
warmup_ratio: 0.03
packing: false
eval_max_new_tokens: 64
dataset:
  train_path: /app/data/synthetic/train.jsonl
  eval_path: /app/data/synthetic/val.jsonl
mlflow:
  experiment_name: structured-output-llm-k8s
  run_name: tiny-gpt2-train
  eval_run_name: tiny-gpt2-eval
