seed: 42
output_dir: /mnt/output/qwen25-structured
max_seq_length: 1024
num_train_epochs: 3
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2e-4
logging_steps: 10
save_steps: 100
save_total_limit: 3
bf16: true
fp16: false
optimizer: paged_adamw_8bit
lr_scheduler_type: cosine
warmup_ratio: 0.03
packing: false
eval_max_new_tokens: 256
dataset:
  train_path: /mnt/data/train.json
  eval_path: /mnt/data/eval.json
mlflow:
  experiment_name: structured-output-llm
  run_name: qwen25-qlora-train
  eval_run_name: qwen25-qlora-eval
