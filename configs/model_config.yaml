model_name: Qwen/Qwen2.5-7B-Instruct
cache_dir: null
load_in_4bit: true
device_map: auto
trust_remote_code: false
max_retries: 3
retry_backoff_seconds: 2
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
quantization:
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true
